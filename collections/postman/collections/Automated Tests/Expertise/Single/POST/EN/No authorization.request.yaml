$kind: http-request
url: "{{expertise-endpoint}}/"
method: POST
headers:
  Accept-Language: en
body:
  type: json
  content: |-
    {
        "title": "My Expertise",
        "description": "This is the description",
        "icon": "ChartBarIcon",
        "sort": 17
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: >-
      var body = pm.response.json()


      pm.test("Expertise / Single / POST / EN / No authorization - Status code
      is 401", function () {
          pm.response.to.have.status(401);
      });


      pm.test("Expertise / Single / POST / EN / No authorization - Message as
      expected", function () {
          pm.expect(body.detail).to.eql('Unauthorized');
      });
    language: text/javascript
order: 3000
