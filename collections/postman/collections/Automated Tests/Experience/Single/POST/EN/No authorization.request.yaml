$kind: http-request
url: "{{experience-endpoint}}/"
method: POST
headers:
  Accept-Language: en
body:
  type: json
  content: |-
    {
        "title": "My Experience",
        "description": "This is the description",
        "extract": "This is the extract",
        "industry": "My Industry",
        "url": "https://test-experience.test",
        "start_date": "2024-01-01",
        "end_date": "2024-12-31"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: >-
      var body = pm.response.json()


      pm.test("Experience / Single / POST / EN / No authorization - Status code
      is 401", function () {
          pm.response.to.have.status(401);
      });


      pm.test("Experience / Single / POST / EN / No authorization - Message as
      expected", function () {
          pm.expect(body.detail).to.eql('Unauthorized');
      });
    language: text/javascript
order: 3000
