$kind: http-request
url: "{{experience-endpoint}}/"
method: POST
headers:
  Accept-Language: fr
body:
  type: json
  content: |-
    {
        "title": "My Experience",
        "description": "This is the description",
        "extract": "This is the extract",
        "industry": "My Industry",
        "url": "https://test-experience.test",
        "start_date": "2024-01-01",
        "end_date": "2024-12-31"
    }
auth:
  type: bearer
  credentials:
    token: "{{token-non-admin}}"
scripts:
  - type: afterResponse
    code: >-
      var body = pm.response.json()


      pm.test("Experience / Single / POST / FR / Non admin user - Status code is
      403", function () {
          pm.response.to.have.status(403);
      });


      pm.test("Experience / Single / POST / FR / Non admin user - Message as
      expected", function () {
          pm.expect(body.detail).to.eql('Forbidden');
      });
    language: text/javascript
order: 2000
