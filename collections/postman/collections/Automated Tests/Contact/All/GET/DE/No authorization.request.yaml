$kind: http-request
url: "{{contact-endpoint}}/"
method: GET
headers:
  Accept-Language: de
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: >-
      var body = pm.response.json()


      pm.test("Contact / All / GET / DE / No authorization - Status code is
      401", function () {
          pm.response.to.have.status(401);
      });


      pm.test("Contact / All / GET / DE / No authorization - Message as
      expected", function () {
          pm.expect(body.detail).to.eql('Unauthorized');
      });
    language: text/javascript
order: 3000
