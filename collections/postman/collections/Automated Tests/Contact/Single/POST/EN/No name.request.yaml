$kind: http-request
url: "{{contact-endpoint}}"
method: POST
headers:
  Content-Type: application/json
  Accept-Language: en
body:
  type: json
  content: |-
    {
        "email": "test@simon-neidig.de",
        "message": "This is a test message."
    }
scripts:
  - type: afterResponse
    code: >
      var body = pm.response.json()


      pm.test("Contact / Single / POST / EN / No name - Status code is 400",
      function () {
          pm.response.to.have.status(400);
      });


      pm.test("Contact / Single / POST / EN / No name - Error message as
      expected", function () {
          pm.expect(body.detail).to.eql('All fields (name, email, message) are required.');
      });
    language: text/javascript
order: 2000
