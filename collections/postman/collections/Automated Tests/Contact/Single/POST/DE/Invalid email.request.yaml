$kind: http-request
url: "{{contact-endpoint}}"
method: POST
headers:
  Content-Type: application/json
  Accept-Language: de
body:
  type: json
  content: |-
    {
        "name": "Testuser",
        "email": "test",
        "message": "This is a test message."
    }
scripts:
  - type: afterResponse
    code: >
      var body = pm.response.json()


      pm.test("Contact / Single / POST / DE / Invalid email - Status code is
      400", function () {
          pm.response.to.have.status(400);
      });


      pm.test("Contact / Single / POST / DE / Invalid email - Error message as
      expected", function () {
          pm.expect(body.detail).to.eql('value is not a valid email address: An email address must have an @-sign.');
      });
    language: text/javascript
order: 4000
