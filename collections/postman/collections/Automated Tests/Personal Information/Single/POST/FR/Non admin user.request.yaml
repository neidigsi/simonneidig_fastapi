$kind: http-request
url: "{{personal-information-endpoint}}/"
method: POST
headers:
  Accept-Language: fr
body:
  type: json
  content: |-
    {
        "title": "My Expertise",
        "description": "This is the description",
        "icon": "ChartBarIcon",
        "sort": 17
    }
auth:
  type: bearer
  credentials:
    token: "{{token-non-admin}}"
scripts:
  - type: afterResponse
    code: >-
      var body = pm.response.json()


      pm.test("Personal Information / Single / POST / FR / Non admin user -
      Status code is 403", function () {
          pm.response.to.have.status(403);
      });


      pm.test("Personal Information / Single / POST / FR / Non admin user -
      Message as expected", function () {
          pm.expect(body.detail).to.eql('Forbidden');
      });
    language: text/javascript
order: 2000
