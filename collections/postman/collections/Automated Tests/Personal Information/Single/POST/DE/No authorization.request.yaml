$kind: http-request
url: "{{personal-information-endpoint}}/"
method: POST
headers:
  Accept-Language: de
body:
  type: json
  content: |-
    {
        "label": "My Info",
        "value": "This is the value",
        "icon": "123456"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: >-
      var body = pm.response.json()


      pm.test("Personal Information / Single / POST / DE / No authorization -
      Status code is 401", function () {
          pm.response.to.have.status(401);
      });


      pm.test("Personal Information / Single / POST / DE / No authorization -
      Message as expected", function () {
          pm.expect(body.detail).to.eql('Unauthorized');
      });
    language: text/javascript
order: 3000
