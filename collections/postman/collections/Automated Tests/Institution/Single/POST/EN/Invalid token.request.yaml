$kind: http-request
url: "{{institution-endpoint}}/"
method: POST
headers:
  Accept-Language: en
body:
  type: json
  content: |-
    {
        "name": "My Institution",
        "address_id": 17
    }
auth:
  type: bearer
  credentials:
    token: abc
scripts:
  - type: afterResponse
    code: >-
      var body = pm.response.json()


      pm.test("Institution / Single / POST / EN / Invalid token - Status code is
      401", function () {
          pm.response.to.have.status(401);
      });


      pm.test("Institution / Single / POST / EN / Invalid token - Message as
      expected", function () {
          pm.expect(body.detail).to.eql('Unauthorized');
      });
    language: text/javascript
order: 4000
